steps:
  # ── Step 1: Build Docker image with all secrets as build args ──────────────
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$$MAPS_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$FB_API_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$FB_AUTH_DOMAIN \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$FB_PROJECT_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$FB_STORAGE_BUCKET \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$FB_SENDER_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=$$FB_APP_ID \
          -t gcr.io/$PROJECT_ID/civiclens:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/civiclens:latest \
          .
    secretEnv:
      - MAPS_KEY
      - FB_API_KEY
      - FB_AUTH_DOMAIN
      - FB_PROJECT_ID
      - FB_STORAGE_BUCKET
      - FB_SENDER_ID
      - FB_APP_ID

  # ── Step 2: Push images to Container Registry ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/civiclens:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/civiclens:latest']

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'civiclens'
      - '--image'
      - 'gcr.io/$PROJECT_ID/civiclens:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '60'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1'

# ── Secret Manager bindings ───────────────────────────────────────────────────
# Create these secrets first:
#   gcloud secrets create MAPS_KEY --replication-policy=automatic
#   echo -n "YOUR_KEY" | gcloud secrets versions add MAPS_KEY --data-file=-
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_GOOGLE_MAPS_API_KEY/versions/latest
      env: MAPS_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_API_KEY/versions/latest
      env: FB_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN/versions/latest
      env: FB_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_PROJECT_ID/versions/latest
      env: FB_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET/versions/latest
      env: FB_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: FB_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_APP_ID/versions/latest
      env: FB_APP_ID

# ── Artifacts to push ─────────────────────────────────────────────────────────
images:
  - 'gcr.io/$PROJECT_ID/civiclens:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/civiclens:latest'

# ── Build options ─────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'    # faster build machine
  diskSizeGb: 100

timeout: '1200s'                 # 20 min build timeout
